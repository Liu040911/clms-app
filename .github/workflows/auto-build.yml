name: Docker Build and Push

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current date and time
        run: echo "BUILD_DATE=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: Set lower case image name
        run: |
          echo "IMAGE_NAME=${REPO,,}" >>${GITHUB_ENV}
        env:
          REPO: '${{ github.repository }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ env.BUILD_DATE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on Self-Hosted Runner
    runs-on: [self-hosted, app-deploy]
    needs: build-and-push
    if: ${{ success() && github.event_name == 'workflow_dispatch' }}
    environment: production
    concurrency:
      group: clms-app-deploy-master
      cancel-in-progress: true
    permissions:
      contents: read
      packages: read

    steps:
      - name: Set lower case image name
        run: |
          echo "IMAGE_NAME=${REPO,,}" >>${GITHUB_ENV}
        env:
          REPO: '${{ github.repository }}'

      - name: Deploy container on runner host
        env:
          DEPLOY_PATH: /home/github-runner/actions-runner/deploy
          DEPLOY_COMPOSE_FILE: docker-compose-prod.yaml
          DEPLOY_SERVICE: clms-app
        run: |
          set -e
          cd "$DEPLOY_PATH"
          export APP_IMAGE="ghcr.io/${IMAGE_NAME}:latest"
          docker compose -f "$DEPLOY_COMPOSE_FILE" pull "$DEPLOY_SERVICE"
          docker compose -f "$DEPLOY_COMPOSE_FILE" stop "$DEPLOY_SERVICE"
          docker compose -f "$DEPLOY_COMPOSE_FILE" up -d "$DEPLOY_SERVICE"
          docker image prune -f
